# Starship prompt — tokyo-night preset
# https://starship.rs/presets/tokyo-night
#
# Requires a Nerd Font: JetBrains Mono Nerd Font recommended.
# Set this font in your terminal emulator (iTerm2 / Zed / VS Code).

format = """
[░▒▓](#a3aed2)\
[ 🌃 ](bg:#a3aed2 fg:#090c0c)\
[](bg:#769ff0 fg:#a3aed2)\
$directory\
[](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
[](fg:#394260 bg:#212736)\
$golang\
$nodejs\
$kubernetes\
[](fg:#212736 bg:#1d2230)\
$time\
[ ](bg:#1d2230)\
\n$character"""

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = ""
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

[golang]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[nodejs]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[kubernetes]
# Only shows when a kubeconfig is active
disabled = false
style = "bg:#212736"
format = '[[ ⎈ $context ](fg:#769ff0 bg:#212736)]($style)'

[time]
disabled = false
time_format = "%H:%M"
style = "bg:#1d2230"
format = '[[  $time ](fg:#a0a9cb bg:#1d2230)]($style)'

[character]
success_symbol = '[›](bold green)'
error_symbol = '[›](bold red)'
